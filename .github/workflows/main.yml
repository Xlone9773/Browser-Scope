name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Typecheck · Build · Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint and Type-Check
        run: npm run lint

      - name: Build (vite / server bundle)
        id: build
        run: npm run build

      - name: Run Unit Tests
        run: npm run test

      - name: Audit dependencies (report)
        run: |
          echo "Running npm audit (non-failing, prints report)."
          npm audit --audit-level=high || true

      - name: Upload build (artifact)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: |
            dist
            build
          if-no-files-found: warn
