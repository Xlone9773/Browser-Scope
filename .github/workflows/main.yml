name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache Node Modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore ESLint Cache
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: ${{ runner.os }}-eslint-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-eslint-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-eslint-

      - name: Lint and Type-Check
        id: lint_step
        run: |
          npx eslint . --format=json --output-file=eslint-report.json || true
          npx tsc --noEmit > tsc-output.log 2>&1 || true

      - name: Generate CI Summary
        if: always()
        run: npx tsx scripts/ci-summary.ts --mode=lint --status=${{ steps.lint_step.outcome }}

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache Node Modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore Vitest Cache
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/vitest
          key: ${{ runner.os }}-vitest-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-vitest-

      - name: Run Unit Tests
        id: test_step
        run: npx vitest run --reporter=default --reporter=json --outputFile=test-results.json

      - name: Generate CI Summary
        if: always()
        run: npx tsx scripts/ci-summary.ts --mode=test --status=${{ steps.test_step.outcome }}

  build:
    name: Build & Asset Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]  # 只在 lint 检查通过后开始构建
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache Node Modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build (vite / server bundle)
        id: build_step
        run: npm run build > build-output.log 2>&1

      - name: Pull Vercel Environment Information
        if: success()
        run: npx vercel pull --yes --environment=${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && 'production' || 'preview' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        if: success()
        run: npx vercel build ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && '--prod' || '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        if: success()
        id: deploy
        run: |
          DEPLOY_ARGS="--prebuilt"
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master" ]]; then
            DEPLOY_ARGS="--prod --prebuilt"
          fi
          DEPLOY_URL=$(npx vercel deploy $DEPLOY_ARGS)
          echo "preview-url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Generate CI Summary
        if: always()
        run: |
          npm audit --json > audit-report.json || true
          npx tsx scripts/ci-summary.ts --mode=build --status=${{ steps.build_step.outcome }}

      - name: Add Vercel URL to Summary
        if: always() && steps.deploy.outcome == 'success'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Vercel Deployment Preview" >> $GITHUB_STEP_SUMMARY
          echo "🟢 Deployed successfully to Vercel!" >> $GITHUB_STEP_SUMMARY
          echo "[🔍 Click here to preview this build](${{ steps.deploy.outputs.preview-url }})" >> $GITHUB_STEP_SUMMARY

      - name: Upload build (artifact)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: |
            dist
            build
          if-no-files-found: warn
