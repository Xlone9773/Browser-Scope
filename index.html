      window.addEventListener('error', function(e) {
        if (e.message && e.message.indexOf('VConsole') !== -1) { e.preventDefault(); e.stopImmediatePropagation(); }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason && e.reason.message ? e.reason.message : String(e.reason);
        if (msg.indexOf('VConsole') !== -1) { e.preventDefault(); e.stopImmediatePropagation(); }
      }, true);
    </script>

      /* 
         === DISABLE VISUAL EFFECTS MODE (Previously High Performance) ===
         Forces opaque backgrounds and removes blur filters to reduce GPU load 
      */
      
      /* 1. Remove all backdrop filters */
      body.no-blur .backdrop-blur-sm,
      body.no-blur .backdrop-blur-md,
      body.no-blur .backdrop-blur-lg,
      body.no-blur .backdrop-blur-xl,
      body.no-blur .backdrop-blur-2xl,
      body.no-blur .backdrop-blur-3xl,
      body.no-blur .backdrop-blur-\[2px\] {
          backdrop-filter: none !important;
          -webkit-backdrop-filter: none !important;
      }
      
      /* 2. Force Opaque Backgrounds in Light Mode */
      html:not(.dark) body.no-blur .bg-white\/50,
      html:not(.dark) body.no-blur .bg-white\/60,
      html:not(.dark) body.no-blur .bg-white\/75,
      html:not(.dark) body.no-blur .bg-white\/80,
      html:not(.dark) body.no-blur .bg-white\/90,

      html:not(.dark) body.no-blur .supports-\[backdrop-filter\]\:bg-white\/60 {
          background-color: #ffffff !important;
          border-color: #e2e8f0 !important; /* slate-200 */
      }

      /* 3. Force Opaque Backgrounds in Dark Mode */
      html.dark body.no-blur .dark\:bg-slate-800\/50,

      /* === CUSTOM ANIMATIONS === */
      @keyframes slideUp { 
          from { opacity: 0; transform: translateY(24px); }

      }
      @keyframes fadeIn { 
          from { opacity: 0; } 
          to { opacity: 1; } 
      }
      @keyframes flyIn { 
          from { opacity: 0; transform: translateX(-32px); } 
          to { opacity: 1; transform: translateX(0); } 
      }
      @keyframes zoomIn {

          to { opacity: 1; transform: scale(1); } 
      }

      /* Make sure key prop change actually triggers by giving them duration */
