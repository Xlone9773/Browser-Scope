  <head>
    <script>
      try {
        var themeColor = localStorage.getItem("themeColor") || "indigo";
        if (themeColor !== "indigo") {
          document.documentElement.classList.add("theme-" + themeColor);
        }
      } catch (e) {}
    </script>
    <script>
      window.addEventListener(
        "error",
        function (e) {
          if (e.message && e.message.indexOf("VConsole") !== -1) {
            e.preventDefault();
            e.stopImmediatePropagation();
          }
        },
        true,
      );
      window.addEventListener(
        "unhandledrejection",
        function (e) {
          var msg =
            e.reason && e.reason.message ? e.reason.message : String(e.reason);
          if (msg.indexOf("VConsole") !== -1) {
            e.preventDefault();
            e.stopImmediatePropagation();
          }
        },
        true,
      );
    </script>

      .dark body {
        background-color: #0f172a; /* Slate 900 */
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #475569;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }

      /* Utility to hide scrollbar but allow scrolling */
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none; /* IE and Edge */
        scrollbar-width: none; /* Firefox */
      }

      /* Utility to hide ALL scrollbars globally */
      html.global-scrollbar-hide *::-webkit-scrollbar,
      html.global-scrollbar-hide::-webkit-scrollbar {
        display: none !important;
      }
      html.global-scrollbar-hide *,
      html.global-scrollbar-hide {
        -ms-overflow-style: none !important;
        scrollbar-width: none !important;
      }

      /* View Transitions API Customization */
      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation-duration: 0.4s;
        mix-blend-mode: normal;
      }

      /* 
         === DISABLE VISUAL EFFECTS MODE (Previously High Performance) ===
         Forces opaque backgrounds and removes blur filters to reduce GPU load 
      */

      /* 1. Remove all backdrop filters */
      body.no-blur .backdrop-blur-sm,
      body.no-blur .backdrop-blur-md,
      body.no-blur .backdrop-blur-lg,
      body.no-blur .backdrop-blur-xl,
      body.no-blur .backdrop-blur-2xl,
      body.no-blur .backdrop-blur-3xl,
      body.no-blur .backdrop-blur-\[2px\] {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }

      /* 2. Force Opaque Backgrounds in Light Mode */
      html:not(.dark) body.no-blur .bg-white\/50,
      html:not(.dark) body.no-blur .bg-white\/60,
      html:not(.dark) body.no-blur .bg-white\/75,
      html:not(.dark) body.no-blur .bg-white\/80,
      html:not(.dark) body.no-blur .bg-white\/90,
      html:not(.dark) body.no-blur .bg-white\/95,
      html:not(.dark) body.no-blur .supports-\[backdrop-filter\]\:bg-white\/60 {
        background-color: #ffffff !important;
        border-color: #e2e8f0 !important; /* slate-200 */
      }

      /* 3. Force Opaque Backgrounds in Dark Mode */
      html.dark body.no-blur .dark\:bg-slate-800\/50,
      html.dark body.no-blur .dark\:bg-slate-800\/60,
      html.dark body.no-blur .dark\:bg-slate-800\/70,
      html.dark body.no-blur .dark\:bg-slate-800\/80,
      html.dark body.no-blur .dark\:bg-slate-800\/90,
      html.dark body.no-blur .dark\:bg-slate-800\/95,
      html.dark
        body.no-blur
        .supports-\[backdrop-filter\]\:dark\:bg-slate-800\/60 {
        background-color: #1e293b !important; /* slate-800 */
        border-color: #334155 !important; /* slate-700 */
      }

      html.dark body.no-blur .dark\:bg-slate-900\/50,
      html.dark body.no-blur .dark\:bg-slate-900\/60,
      html.dark body.no-blur .dark\:bg-slate-900\/75,
      html.dark body.no-blur .dark\:bg-slate-900\/80,
      html.dark body.no-blur .dark\:bg-slate-900\/90,
      html.dark body.no-blur .dark\:bg-slate-900\/95,
      html.dark body.no-blur .dark\:bg-black\/40,
      html.dark body.no-blur .dark\:bg-black\/50,
      html.dark body.no-blur .dark\:bg-black\/60 {
        background-color: #0f172a !important; /* slate-900 */
        border-color: #334155 !important; /* slate-700 */
      }

      /* 4. Specific Component Overrides */
      /* Modal Overlay - make it solid dark to hide content behind */
      body.no-blur .fixed.inset-0.bg-slate-900\/60 {
        background-color: rgba(15, 23, 42, 0.98) !important;
      }

      /* === FAST TRANSITIONS MODE === */
      body.fast-animations * {
        transition-duration: 0.1s !important;
      }

      /* === CUSTOM ANIMATIONS === */
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes flyIn {
        from {
          opacity: 0;
          transform: translateX(-32px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes zoomIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* Make sure key prop change actually triggers by giving them duration */
      .anim-slide-up {
        animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards !important;
      }
      .anim-fade {
        animation: fadeIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards !important;
      }
      .anim-fly-in {
        animation: flyIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards !important;
      }
      .anim-zoom {
        animation: zoomIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards !important;
      }

      /* Delay modifiers for sub-sections */
      .delay-100 {
        animation-delay: 100ms;
        animation-fill-mode: both;
      }
      .delay-200 {
        animation-delay: 200ms;
        animation-fill-mode: both;
      }

      /* === DISABLE ANIMATIONS MODE === */
      body.disable-animations * {
        animation-duration: 0s !important;
        transition-duration: 0s !important;
        animation: none !important;
      }

      /* === VCONSOLE SCROLL PATCH === */
      #__vconsole .vc-mask,
      #__vconsole .vc-panel,
      #__vconsole .vc-scroller {
        overscroll-behavior: none !important;
      }

      /* === ERUDA SCROLL PATCH === */
      #eruda-container,
      .eruda-container {
        overscroll-behavior: none !important;
      }

        background-repeat: no-repeat;

      }

      .goog-te-gadget {

    </style>

  <body>
    <div id="root"></div>
    <!-- Google Translate Widget (Hidden by default, shown when requested) -->
    <div id="google_translate_wrapper" class="hidden fixed bottom-5 left-5 z-[9999] bg-white/90 dark:bg-slate-900/90 backdrop-blur-md p-1 rounded-xl border border-slate-200/50 dark:border-slate-700/50 shadow-2xl transition-all duration-300">
      <div id="google_translate_element" class="px-2 py-1"></div>
      <button onclick="document.getElementById('google_translate_wrapper').classList.add('hidden')" class="absolute -top-2.5 -right-2.5 bg-rose-500 hover:bg-rose-600 text-white rounded-full w-6 h-6 flex items-center justify-center shadow-md transition-colors font-medium border-2 border-white dark:border-slate-800 text-sm">×</button>
    </div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'auto',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
