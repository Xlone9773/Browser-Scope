
<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      window.addEventListener('error', function(e) {
        if (e.message && e.message.indexOf('VConsole') !== -1) { e.preventDefault(); e.stopImmediatePropagation(); }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason && e.reason.message ? e.reason.message : String(e.reason);
        if (msg.indexOf('VConsole') !== -1) { e.preventDefault(); e.stopImmediatePropagation(); }
      }, true);
    </script>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrowserScope - Device Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', "Segoe UI", 'Roboto', "Helvetica Neue", 'Arial', "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "WenQuanYi Micro Hei", 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      body {
        /* font-family set in tailwind config now */
        background-color: #f8fafc; /* Slate 50 */
        transition: background-color 0.3s ease-in-out, color 0.3s ease-in-out;
      }
      .dark body {
        background-color: #0f172a; /* Slate 900 */
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #475569;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }

      /* Utility to hide scrollbar but allow scrolling */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }

      /* Utility to hide ALL scrollbars globally */
      html.global-scrollbar-hide *::-webkit-scrollbar,
      html.global-scrollbar-hide::-webkit-scrollbar {
          display: none !important;
      }
      html.global-scrollbar-hide *,
      html.global-scrollbar-hide {
          -ms-overflow-style: none !important;
          scrollbar-width: none !important;
      }

      /* View Transitions API Customization */
      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation-duration: 0.4s;
        mix-blend-mode: normal;
      }

      /* 
         === DISABLE VISUAL EFFECTS MODE (Previously High Performance) ===
         Forces opaque backgrounds and removes blur filters to reduce GPU load 
      */
      
      /* 1. Remove all backdrop filters */
      body.no-blur .backdrop-blur-sm,
      body.no-blur .backdrop-blur-md,
      body.no-blur .backdrop-blur-lg,
      body.no-blur .backdrop-blur-xl,
      body.no-blur .backdrop-blur-2xl,
      body.no-blur .backdrop-blur-3xl,
      body.no-blur .backdrop-blur-\[2px\] {
          backdrop-filter: none !important;
          -webkit-backdrop-filter: none !important;
      }
      
      /* 2. Force Opaque Backgrounds in Light Mode */
      body.no-blur .bg-white\/50,
      body.no-blur .bg-white\/60,
      body.no-blur .bg-white\/75,
      body.no-blur .bg-white\/80,
      body.no-blur .bg-white\/90,
      body.no-blur .bg-white\/95 {
          background-color: #ffffff !important;
          border-color: #e2e8f0 !important; /* slate-200 */
      }

      /* 3. Force Opaque Backgrounds in Dark Mode */
      .dark body.no-blur .bg-slate-900\/50,
      .dark body.no-blur .bg-slate-900\/60,
      .dark body.no-blur .bg-slate-900\/75,
      .dark body.no-blur .bg-slate-900\/80,
      .dark body.no-blur .bg-slate-900\/90,
      .dark body.no-blur .bg-slate-900\/95,
      .dark body.no-blur .bg-black\/40,
      .dark body.no-blur .bg-black\/50,
      .dark body.no-blur .bg-black\/60 {
          background-color: #0f172a !important; /* slate-900 */
          border-color: #334155 !important; /* slate-700 */
      }
      
      /* 4. Specific Component Overrides */
      /* Modal Overlay - make it solid dark to hide content behind */
      body.no-blur .fixed.inset-0.bg-slate-900\/60 {
          background-color: rgba(15, 23, 42, 0.98) !important;
      }

      /* === FAST TRANSITIONS MODE === */
      body.fast-animations * {
          transition-duration: 0.1s !important;
      }

      /* === DISABLE ANIMATIONS MODE === */
      body.disable-animations * {
          animation-duration: 0s !important;
          transition-duration: 0s !important;
          animation: none !important;
      }
    </style>
